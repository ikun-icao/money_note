<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>理财收益记录</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <header>
        <div class="container">
            <h1>Dq的财富之旅</h1>
            <p>每日理财收益追踪与分析</p>
        </div>
    </header>
    
    <main>
        <section class="hero">
            <div class="container">
                <div class="hero-content">
                    <h2>今日收益</h2>
                    <div class="today-return">¥<span id="today-amount">0.00</span></div>
                    <div class="return-percentage" id="today-percentage">+0.00%</div>
                </div>
                <div class="hero-actions">
                    <button id="add-record-btn">添加今日记录</button>
                    <button id="edit-record-btn">修改往期记录</button>
                </div>
            </div>
        </section>
        
        <section class="chart-section">
            <div class="container">
                <h2>收益曲线</h2>
                <div class="chart-container">
                    <canvas id="return-chart"></canvas>
                </div>
            </div>
        </section>
        
        <section class="heatmap-section">
            <div class="container">
                <h2>收益热力图</h2>
                <div class="heatmap-container">
                    <div class="heatmap-header">
                        <div class="heatmap-year">2026</div>
                    </div>
                    <div class="heatmap-months">
                        <div class="heatmap-month">1月</div>
                        <div class="heatmap-month">2月</div>
                        <div class="heatmap-month">3月</div>
                        <div class="heatmap-month">4月</div>
                        <div class="heatmap-month">5月</div>
                        <div class="heatmap-month">6月</div>
                        <div class="heatmap-month">7月</div>
                        <div class="heatmap-month">8月</div>
                        <div class="heatmap-month">9月</div>
                        <div class="heatmap-month">10月</div>
                        <div class="heatmap-month">11月</div>
                        <div class="heatmap-month">12月</div>
                    </div>
                    <div class="heatmap" id="heatmap"></div>
                    <div class="heatmap-legend">
                        <span>亏钱</span>
                        <div class="heatmap-legend-colors">
                            <div class="heatmap-legend-color" style="background-color: #f0f0f0;"></div>
                            <div class="heatmap-legend-color" style="background-color: #c6e48b;"></div>
                            <div class="heatmap-legend-color" style="background-color: #7bc96f;"></div>
                            <div class="heatmap-legend-color" style="background-color: #239a3b;"></div>
                            <div class="heatmap-legend-color" style="background-color: #196127;"></div>
                        </div>
                        <span>挣钱</span>
                        <div class="heatmap-legend-colors">
                            <div class="heatmap-legend-color" style="background-color: #ffd6d6;"></div>
                            <div class="heatmap-legend-color" style="background-color: #ff9999;"></div>
                            <div class="heatmap-legend-color" style="background-color: #ff6666;"></div>
                            <div class="heatmap-legend-color" style="background-color: #ff3333;"></div>
                        </div>
                        <span>More</span>
                    </div>
                </div>
            </div>
        </section>
        
        <section class="notes-section">
            <div class="container">
                <h2>理财笔记</h2>
                <div class="notes-content">
                    <textarea id="notes-input" placeholder="记录你的理财心得..."></textarea>
                    <button id="save-notes-btn">保存笔记</button>
                </div>
                <div class="saved-notes" id="saved-notes"></div>
            </div>
        </section>
    </main>
    
    <footer>
        <div class="container">
            <p>&copy; 2026 理财收益记录</p>
        </div>
    </footer>
    
    <div class="modal" id="add-record-modal">
        <div class="modal-content">
            <h3>添加今日收益记录</h3>
            <form id="add-record-form">
                <div class="form-group">
                    <label for="date">日期</label>
                    <input type="date" id="date" required>
                </div>
                <div class="form-group">
                    <label for="amount">收益金额</label>
                    <input type="number" id="amount" step="0.01" required>
                </div>
                <div class="form-group">
                    <label for="percentage">收益率</label>
                    <input type="number" id="percentage" step="0.01" required>
                </div>
                <div class="form-actions">
                    <button type="button" id="cancel-btn">取消</button>
                    <button type="submit">保存</button>
                </div>
            </form>
        </div>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
